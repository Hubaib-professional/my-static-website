# Modified version that forces creation even on first run
name: Multi-Environment Deployment

on:
  push:
    branches: [ main, develop, staging ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options:
          - development
          - staging
          - production

jobs:
  # Build job - always runs
  build:
    runs-on: ubuntu-latest
    outputs:
      build_version: ${{ steps.version.outputs.build_version }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate build version
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          TIMESTAMP=$(date -u +"%Y%m%d-%H%M%S")
          echo "build_version=${SHORT_SHA}-${TIMESTAMP}" >> $GITHUB_OUTPUT
          echo "📦 Build version: ${SHORT_SHA}-${TIMESTAMP}"
      
      - name: Create build artifact
        run: |
          mkdir -p dist
          echo "<h1>Multinet Deployment</h1>" > dist/index.html
          echo "<p>Version: ${{ steps.version.outputs.build_version }}</p>" >> dist/index.html
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: website-build
          path: dist/
          retention-days: 7

  # Development - always runs (no condition)
  deploy-development:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref_name == 'develop'
    environment:
      name: development
      url: https://dev.multinet.com
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: website-build
          path: deploy/
      
      - name: Deploy to Development
        run: |
          echo "🚀 Deploying to Development"
          echo "Version: ${{ needs.build.outputs.build_version }}"
          echo "✅ Development deployment complete"

  # Staging - always runs when condition met
  deploy-staging:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref_name == 'staging'
    environment:
      name: staging
      url: https://staging.multinet.com
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: website-build
          path: deploy/
      
      - name: Deploy to Staging
        run: |
          echo "🚀 Deploying to Staging"
          echo "Version: ${{ needs.build.outputs.build_version }}"
          echo "✅ Staging deployment complete"

  # Production - always runs (no condition, but requires manual approval via environment settings)
  deploy-production:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref_name == 'main' || github.event.inputs.environment == 'production'
    environment:
      name: production
      url: https://multinet.com
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: website-build
          path: deploy/
      
      - name: Deploy to Production
        run: |
          echo "🚀 Deploying to PRODUCTION"
          echo "Version: ${{ needs.build.outputs.build_version }}"
          echo "✅ Production deployment complete"