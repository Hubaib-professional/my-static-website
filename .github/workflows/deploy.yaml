name: Deploy Static Website to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Verify files exist
        run: |
          echo "📁 Checking repository contents:"
          ls -la
          if [ -f index.html ]; then
            echo "✅ index.html found in root!"
          else
            echo "❌ ERROR: index.html not found in root!"
            exit 1
          fi
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'  # Upload entire repository, not just build folder
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4