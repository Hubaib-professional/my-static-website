name: Deploy Static Website to GitHub Pages

# Trigger the workflow on push to main branch
on:
  push:
    branches: [ main ]
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

# Sets permissions for deploying to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # Step 2: Setup Node.js (for any build tools if needed)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      # Step 3: Install dependencies (if any)
      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm ci
          fi
      
      # Step 4: Run tests (if any)
      - name: Run tests
        run: |
          if [ -f package.json ] && [ -f "test.js" ]; then
            npm test
          fi
          echo "✅ No tests to run"
      
      # Step 5: Build the site (if using a framework)
      - name: Build site
        run: |
          if [ -f package.json ] && [ -f "build.js" ]; then
            npm run build
          else
            echo "No build step required"
            # Create build directory and copy files
            mkdir -p build
            cp -r * build/ 2>/dev/null || true
          fi
      
      # Step 6: Upload artifact for deployment
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build
  
  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      # Step 7: Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v1